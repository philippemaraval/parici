name: Sync OSM Streets

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "Source that requested the sync"
        required: false
        default: "manual"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-osm
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.OSM_SYNC_PR_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run OSM sync
        run: node scripts/sync_osm.js

      - name: Validate generated files
        run: |
          node -e "const fs=require('fs'); for (const file of ['data/paris_rues_light.geojson','data/paris_rues_enrichi.geojson','data/paris_arrondissements.geojson','data/paris_monuments.geojson','backend/data/paris_rues_light.geojson','backend/data/paris_arrondissements.geojson','backend/data/paris_monuments.geojson','backend/data/streets_index.json','data/map_sync_meta.json']) { const parsed=JSON.parse(fs.readFileSync(file,'utf8')); if (!parsed) throw new Error(file + ' is empty'); }"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/ backend/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No street data changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ADDED=$(git diff --stat data/paris_rues_light.geojson | tail -1)
            echo "diff_summary=$ADDED" >> $GITHUB_OUTPUT
          fi

      - name: Commit admin sync to main
        if: steps.check.outputs.changed == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/paris_rues_light.geojson \
            data/paris_rues_enrichi.geojson \
            data/paris_arrondissements.geojson \
            data/paris_monuments.geojson \
            data/map_sync_meta.json \
            backend/data/paris_rues_light.geojson \
            backend/data/paris_arrondissements.geojson \
            backend/data/paris_monuments.geojson \
            backend/data/streets_index.json
          git commit -m "sync: update Paris street data from OSM"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true' && github.event_name != 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.OSM_SYNC_PR_TOKEN || github.token }}
          commit-message: "sync: update Paris street data from OSM"
          title: "🗺️ Weekly Paris OSM Street Sync"
          body: |
            Automated weekly sync of Paris street data from OpenStreetMap.

            **Changes:** ${{ steps.check.outputs.diff_summary }}

            This PR was created automatically by the `sync-osm` GitHub Action.
          branch: osm-sync-auto
          delete-branch: true
          labels: osm-sync
          add-paths: |
            data/paris_rues_light.geojson
            data/paris_rues_enrichi.geojson
            data/paris_arrondissements.geojson
            data/paris_monuments.geojson
            data/map_sync_meta.json
            backend/data/paris_rues_light.geojson
            backend/data/paris_arrondissements.geojson
            backend/data/paris_monuments.geojson
            backend/data/streets_index.json
